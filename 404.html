<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Clusterscore</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://clusterscore.com/">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1ea; --ink: #1a1816; --ink-3: #6b6359;
    --accent-2: #5c58e8; --font-display: 'Barlow', sans-serif; --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink);
    font-family: var(--font-display);
    display: flex; align-items: center; justify-content: center; padding: 40px 20px;
  }
  .wrap { max-width: 480px; text-align: center; }
  .code { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--accent-2); margin-bottom: 12px; }
  h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 16px; }
  p { font-size: 16px; color: var(--ink-3); line-height: 1.5; margin: 0 0 28px; }
  a.btn {
    display: inline-block; background: var(--ink); color: var(--paper);
    text-decoration: none; font-weight: 600; font-size: 16px;
    padding: 14px 24px; border-radius: 8px;
  }
  a.btn:hover { background: var(--accent-2); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist on Clusterscore. Head back to run an internal link audit.</p>
    <a class="btn" href="/">Go to Clusterscore →</a>
  </div>
</body>
</html>
